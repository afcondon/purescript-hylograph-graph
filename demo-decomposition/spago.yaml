workspace:
  extraPackages: {}

package:
  name: hylograph-graph-decomposition-demo
  description: "Graph Decomposition Explorer: structural analysis and chimera visualization"
  dependencies:
    - arrays: ">=7.3.0 <8.0.0"
    - effect: ">=4.0.0 <5.0.0"
    - either: ">=6.1.0 <7.0.0"
    - foldable-traversable: ">=6.0.0 <7.0.0"
    - halogen: ">=7.0.0 <8.0.0"
    - hylograph-graph: ">=0.1.0 <0.2.0"
    - hylograph-layout: ">=0.2.0 <0.3.0"
    - hylograph-selection: ">=0.2.0 <0.3.0"
    - integers: ">=6.0.0 <7.0.0"
    - maybe: ">=6.0.0 <7.0.0"
    - numbers: ">=9.0.1 <10.0.0"
    - ordered-collections: ">=3.2.0 <4.0.0"
    - prelude: ">=6.0.2 <7.0.0"
    - strings: ">=6.0.1 <7.0.0"
    - tuples: ">=7.0.0 <8.0.0"
    - unsafe-coerce: ">=6.0.0 <7.0.0"
    - web-dom: ">=6.0.0 <7.0.0"
    - web-html: ">=4.1.1 <5.0.0"

  bundle:
    module: Decomposition.Main
    outfile: public/bundle.js
    platform: browser
